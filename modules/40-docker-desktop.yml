# Docker Engine (CLI + daemon) и Docker Desktop (GUI).
# Engine: systemctl start docker. Desktop: приложение Docker Desktop или systemctl --user start docker-desktop
name: docker-and-desktop
type: shell
commands:
  - apt-get remove -y docker.io docker-doc docker-compose podman-docker 2>/dev/null || true
  - apt-get update
  - apt-get install -y ca-certificates curl
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - echo "Types: deb" > /etc/apt/sources.list.d/docker.sources
  - echo "URIs: https://download.docker.com/linux/debian" >> /etc/apt/sources.list.d/docker.sources
  - echo "Suites: bookworm" >> /etc/apt/sources.list.d/docker.sources
  - echo "Components: stable" >> /etc/apt/sources.list.d/docker.sources
  - echo "Signed-By: /etc/apt/keyrings/docker.asc" >> /etc/apt/sources.list.d/docker.sources
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable docker.service
  - wget -q -O /tmp/docker-desktop-amd64.deb https://desktop.docker.com/linux/main/amd64/docker-desktop-amd64.deb
  - apt-get install -y /tmp/docker-desktop-amd64.deb || true
  - rm -f /tmp/docker-desktop-amd64.deb
